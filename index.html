<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: white;
        color: black;
    }
    .dark{
        background-color:black;
        color: white;
    }
</style>
<body>
    <button onclick=togglemode()>👀</button>
    <h1>Lorem ipsum dolor sit.</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Magni voluptate corporis itaque explicabo placeat, excepturi dolorem dolor fugiat provident ea!</p>
</body>
<script>
    function togglemode(){
        document.body.classList.toggle("dark")
    }
</script>

</html>
